services:
  mariadb:
    image: mariadb:11.4
    container_name: bd2-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: bd2-projekt/Dockerfile
    container_name: bd2-web
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MariaDb: server=mariadb;port=3306;database=${MARIADB_DATABASE};user=${MARIADB_USER};password=${MARIADB_PASSWORD};
      MariaDbServerVersion: ${MARIADB_SERVER_VERSION:-11.4.0-mariadb}
      SharedAccessPassword: ${SHARED_ACCESS_PASSWORD}

volumes:
  mariadb-data:
